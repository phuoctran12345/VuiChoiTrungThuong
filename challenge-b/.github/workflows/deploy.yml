# ===================================================
# ✅ CHALLENGE B — CI/CD Pipeline ĐÃ TỐI ƯU
# ===================================================

name: Build & Deploy (OPTIMIZED)

on:
  push:
    branches: [ main ]

jobs:
  # ✅ Gộp 1 job duy nhất: test + build + push
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ✅ Setup Node để chạy test
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✅ npm ci --omit=dev nhanh hơn npm install
      - name: Install dependencies
        run: npm ci

      # ✅ Chạy test trước khi build
      - name: Run tests
        run: npm test

      # ✅ Setup Buildx để dùng cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Login vào GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Build + Push với GHA cache (nhanh hơn nhiều lần sau)
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
